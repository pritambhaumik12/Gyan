<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyanSetu - Bridging the Gap Between You and Your Goals</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-tertiary: #374151;
            --border-color: #4b5563;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1rem 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Navigation */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0;
        }

        .nav-list {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-item {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
        }

        .nav-item.active {
            background: var(--primary-color);
            color: white;
        }

        /* Main Content */
        .main-content {
            min-height: calc(100vh - 200px);
            padding: 2rem 0;
        }

        /* Cards */
        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-list {
                flex-direction: column;
                gap: 0.5rem;
            }

            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Book card specific styles */
        .book-card {
            position: relative;
            overflow: hidden;
        }

        .book-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .book-actions .btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.875rem;
        }

        /* Search and filters */
        .search-section {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Admin specific styles */
        .admin-header {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* Table styles */
        .table-container {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-primary);
            border-radius: 0.75rem;
            overflow: hidden;
        }

        .table th,
        .table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .table th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        .table tr:hover {
            background: var(--bg-tertiary);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 0.75rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            z-index: 10001;
            animation: slideInRight 0.3s ease-out;
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--danger-color);
        }

        .toast.warning {
            background: var(--warning-color);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--success-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-bridge"></i>
                    GyanSetu
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon" id="theme-icon"></i>
                    </button>
                    <div id="userActions"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav" id="navigation">
        <div class="container">
            <ul class="nav-list" id="navList">
                <!-- Navigation items will be populated by JavaScript -->
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Content will be dynamically loaded here -->
            <div id="content"></div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // Global variables
        let currentUser = null;
        let isAdmin = false;
        let currentView = 'home';
        let books = [];
        let users = [];
        let categories = {};

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
        });

        // Initialize application
        async function initializeApp() {
            try {
                // Check if user is logged in
                const user = await google.script.run.withSuccessHandler(function(result) {
                    if (result.success) {
                        currentUser = result.user;
                        isAdmin = result.user.role === 'admin';
                        setupNavigation();
                        loadView('dashboard');
                    } else {
                        loadView('login');
                    }
                }).withFailureHandler(function(error) {
                    console.error('Error checking login status:', error);
                    loadView('login');
                }).checkLoginStatus();

                // Initialize theme
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeIcon();
            } catch (error) {
                console.error('Error initializing app:', error);
                loadView('login');
            }
        }

        // Setup navigation based on user role
        function setupNavigation() {
            const navList = document.getElementById('navList');
            const userActions = document.getElementById('userActions');
            
            navList.innerHTML = '';
            
            if (isAdmin) {
                // Admin navigation
                navList.innerHTML = `
                    <li class="nav-item active" onclick="loadView('dashboard')">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </li>
                    <li class="nav-item" onclick="loadView('books')">
                        <i class="fas fa-book"></i> Books
                    </li>
                    <li class="nav-item" onclick="loadView('users')">
                        <i class="fas fa-users"></i> Users
                    </li>
                    <li class="nav-item" onclick="loadView('categories')">
                        <i class="fas fa-tags"></i> Categories
                    </li>
                    <li class="nav-item" onclick="loadView('analytics')">
                        <i class="fas fa-chart-bar"></i> Analytics
                    </li>
                    <li class="nav-item" onclick="loadView('announcements')">
                        <i class="fas fa-bullhorn"></i> Announcements
                    </li>
                `;
                
                userActions.innerHTML = `
                    <span>Welcome, ${currentUser.name}</span>
                    <button class="btn btn-secondary" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                `;
            } else {
                // User navigation
                navList.innerHTML = `
                    <li class="nav-item active" onclick="loadView('dashboard')">
                        <i class="fas fa-home"></i> Home
                    </li>
                    <li class="nav-item" onclick="loadView('library')">
                        <i class="fas fa-book-open"></i> Library
                    </li>
                    <li class="nav-item" onclick="loadView('bookmarks')">
                        <i class="fas fa-bookmark"></i> Bookmarks
                    </li>
                    <li class="nav-item" onclick="loadView('profile')">
                        <i class="fas fa-user"></i> Profile
                    </li>
                `;
                
                userActions.innerHTML = `
                    <span>Welcome, ${currentUser.name}</span>
                    <button class="btn btn-secondary" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                `;
            }
        }

        // Load different views
        async function loadView(view) {
            currentView = view;
            updateNavigation();
            
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                switch(view) {
                    case 'login':
                        content.innerHTML = getLoginHTML();
                        break;
                    case 'dashboard':
                        if (isAdmin) {
                            await loadAdminDashboard();
                        } else {
                            await loadUserDashboard();
                        }
                        break;
                    case 'library':
                        await loadLibrary();
                        break;
                    case 'books':
                        await loadBooksManagement();
                        break;
                    case 'users':
                        await loadUsersManagement();
                        break;
                    case 'categories':
                        await loadCategoriesManagement();
                        break;
                    case 'analytics':
                        await loadAnalytics();
                        break;
                    case 'announcements':
                        await loadAnnouncements();
                        break;
                    case 'bookmarks':
                        await loadBookmarks();
                        break;
                    case 'profile':
                        await loadProfile();
                        break;
                    default:
                        content.innerHTML = '<h2>Page not found</h2>';
                }
            } catch (error) {
                console.error('Error loading view:', error);
                content.innerHTML = '<h2>Error loading page</h2>';
            }
        }

        // Update navigation active state
        function updateNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.textContent.toLowerCase().includes(currentView)) {
                    item.classList.add('active');
                }
            });
        }

        // Theme toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const themeIcon = document.getElementById('theme-icon');
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                themeIcon.className = 'fas fa-sun';
            } else {
                themeIcon.className = 'fas fa-moon';
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Logout function
        function logout() {
            google.script.run.withSuccessHandler(function() {
                currentUser = null;
                isAdmin = false;
                loadView('login');
            }).logout();
        }

        // Login form HTML
        function getLoginHTML() {
            return `
                <div class="grid grid-2" style="max-width: 800px; margin: 0 auto;">
                    <div class="card fade-in">
                        <h2 style="text-align: center; margin-bottom: 2rem;">
                            <i class="fas fa-bridge"></i> Welcome to GyanSetu
                        </h2>
                        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
                            Bridging the Gap Between You and Your Goals
                        </p>
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="loginEmail" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-input" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </form>
                        <p style="text-align: center; margin-top: 1rem;">
                            <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                        </p>
                    </div>
                    
                    <div class="card fade-in">
                        <h3 style="margin-bottom: 1rem;">New to GyanSetu?</h3>
                        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                            Join our community of learners and access thousands of educational resources.
                        </p>
                        <form id="registerForm" onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" id="registerName" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="registerEmail" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-input" id="registerPassword" required>
                            </div>
                            <button type="submit" class="btn btn-success" style="width: 100%;">
                                <i class="fas fa-user-plus"></i> Register
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const result = await google.script.run.withSuccessHandler(function(result) {
                    if (result.success) {
                        currentUser = result.user;
                        isAdmin = result.user.role === 'admin';
                        setupNavigation();
                        loadView('dashboard');
                        showToast('Login successful!', 'success');
                    } else {
                        showToast(result.message || 'Login failed', 'error');
                    }
                }).withFailureHandler(function(error) {
                    showToast('Login failed. Please try again.', 'error');
                }).login(email, password);
            } catch (error) {
                showToast('Login failed. Please try again.', 'error');
            }
        }

        // Handle registration
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            try {
                const result = await google.script.run.withSuccessHandler(function(result) {
                    if (result.success) {
                        showToast('Registration successful! Please login.', 'success');
                        document.getElementById('registerForm').reset();
                    } else {
                        showToast(result.message || 'Registration failed', 'error');
                    }
                }).withFailureHandler(function(error) {
                    showToast('Registration failed. Please try again.', 'error');
                }).register(name, email, password);
            } catch (error) {
                showToast('Registration failed. Please try again.', 'error');
            }
        }

        // Show forgot password modal
        function showForgotPassword() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Reset Password</h3>
                        <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <form onsubmit="handleForgotPassword(event)">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="resetEmail" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Send Reset Link
                        </button>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Handle forgot password
        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            
            try {
                const result = await google.script.run.withSuccessHandler(function(result) {
                    if (result.success) {
                        showToast('Password reset link sent to your email!', 'success');
                        event.target.closest('.modal').remove();
                    } else {
                        showToast(result.message || 'Failed to send reset link', 'error');
                    }
                }).withFailureHandler(function(error) {
                    showToast('Failed to send reset link. Please try again.', 'error');
                }).forgotPassword(email);
            } catch (error) {
                showToast('Failed to send reset link. Please try again.', 'error');
            }
        }
    </script>
</body>
